<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="/style/font.css" rel="stylesheet" type="text/css">
  <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

  <title>AoShop</title>


  <!-- Contenedor para el navbar -->
  <div id="navbar-container"></div>

</head>

<body>
  <!-- Contenedor para el modal del carrito -->
  <div id="modal-container"></div>

  <section
    class="min-h-screen flex flex-col items-center justify-center text-center px-4  bg-gradient-to-b from-[#1a1a2e] to-[#0B0710]">
    <div class="max-w-3xl mx-auto ">
      <h1 class="text-5xl md:text-6xl font-extrabold mb-4 tracking-tight">
        La noche nos inspira
      </h1>
      <p class="text-lg md:text-xl text-gray-300 mb-8 max-w-2xl mx-auto">
        Productos inspirados en la luna, las estrellas y la magia que solo aparece cuando todo se silencia.
      </p>
      <a href="#articulos"
        class="inline-block bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-8 py-3 rounded-lg transition duration-200 shadow-lg hover:shadow-indigo-500/30">
        Ver colección
      </a>
    </div>
  </section>

  <section class="py-16 px-4  dark:color-navbar">
    <div class="max-w-7xl mx-auto">
      <!-- Encabezado -->
      <div class="text-center mb-12">
        <h2 id="articulos" class="text-3xl md:text-4xl font-bold text-gray-900 dark:text-white">
          Nuevos productos
        </h2>
        <p class="text-gray-600 dark:text-gray-400 mt-2">
          Magia recién llegada del cielo nocturno
        </p>
      </div>

      <!-- Sección de catálogo general -->
      <div id="catalogo-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 productos"></div>
  </section>
  <section>
    <div class="text-center mb-12">
      <h2 id="articulos" class="text-3xl md:text-4xl font-bold text-gray-900 dark:text-white">
        Favoritos
      </h2>
    </div>
    <!-- Sección de favoritos -->
    <div id="favoritos-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 productos"></div>
    </div>
  </section>



  <!-- ===== JAVASCRIPT ===== -->
  <script type="module" src="./javascript/app.js"></script>
  <script type="module" src="./javascript/favorite.js"></script>
  <script src="./javascript/carrito.js"></script>
  <script src="./javascript/navbar_control.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
</body>

</html>
